<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hazmat ToolK.I.T.</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <header class="hero">
      <h1>Hazmat ToolK.I.T.</h1>
      <p>Click a drawer to open tools.</p>
    </header>

    <section class="pricing-legend" aria-label="Pricing tiers">
      <h2>Pricing Legend</h2>
      <ul>
        <li><strong>Tier 0</strong> <span>Free</span></li>
        <li><strong>Tier 1</strong> <span>$25/year</span></li>
        <li><strong>Tier 2</strong> <span>$50/year</span></li>
        <li><strong>Tier 3</strong> <span>$500/year</span></li>
      </ul>
    </section>

    <section class="toolbox-section" aria-labelledby="responder-heading">
      <h2 id="responder-heading">Responder Toolbox</h2>
      <div class="toolbox-frame">
        <img src="responder_red_split_1800w.png" alt="Responder red toolbox" width="1800" height="2400" />
        <svg class="toolbox-overlay" viewBox="0 0 1800 2400" aria-label="Responder toolbox drawer links">
          <a class="drawer-link" href="/tools/hazmat-toolkit" aria-label="Hazmat ToolK.I.T., Tier 3, 500 dollars per year">
            <rect class="drawer-hit" x="360" y="1200" width="1080" height="96" rx="10" />
            <text class="drawer-label" x="402" y="1260">Hazmat ToolK.I.T.</text>
            <rect class="badge-bg" x="1075" y="1216" width="340" height="64" rx="30" />
            <text class="badge-text" x="1245" y="1258">Tier 3 · $500/yr</text>
          </a>

          <a class="drawer-link" href="/tools/flamenator-9000" aria-label="Flamenator 9000, Tier 2, 50 dollars per year">
            <rect class="drawer-hit" x="360" y="1330" width="1080" height="96" rx="10" />
            <text class="drawer-label" x="402" y="1390">Flamenator 9000</text>
            <rect class="badge-bg" x="1075" y="1346" width="340" height="64" rx="30" />
            <text class="badge-text" x="1245" y="1388">Tier 2 · $50/yr</text>
          </a>

          <a class="drawer-link" href="/tools/plumenator-9000" aria-label="Plumenator 9000, Tier 2, 50 dollars per year">
            <rect class="drawer-hit" x="360" y="1460" width="1080" height="96" rx="10" />
            <text class="drawer-label" x="402" y="1520">Plumenator 9000</text>
            <rect class="badge-bg" x="1075" y="1476" width="340" height="64" rx="30" />
            <text class="badge-text" x="1245" y="1518">Tier 2 · $50/yr</text>
          </a>

          <a class="drawer-link" href="/tools/after-action-reporter" aria-label="After Action Reporter, Tier 2, 50 dollars per year">
            <rect class="drawer-hit" x="360" y="1590" width="1080" height="96" rx="10" />
            <text class="drawer-label" x="402" y="1650">After Action Reporter</text>
            <rect class="badge-bg" x="1075" y="1606" width="340" height="64" rx="30" />
            <text class="badge-text" x="1245" y="1648">Tier 2 · $50/yr</text>
          </a>

          <a class="drawer-link" href="/tools/incident-mapper" aria-label="Incident Mapper, Tier 3, 500 dollars per year">
            <rect class="drawer-hit" x="360" y="1720" width="1080" height="96" rx="10" />
            <text class="drawer-label" x="402" y="1780">Incident Mapper</text>
            <rect class="badge-bg" x="1075" y="1736" width="340" height="64" rx="30" />
            <text class="badge-text" x="1245" y="1778">Tier 3 · $500/yr</text>
          </a>
        </svg>
      </div>
    </section>

    <section class="toolbox-section" aria-labelledby="trainer-heading">
      <h2 id="trainer-heading">Trainer Toolbox</h2>
      <div class="toolbox-frame">
        <img src="trainer_blue_split_1800w.png" alt="Trainer blue toolbox" width="1800" height="2400" />
        <svg class="toolbox-overlay" viewBox="0 0 1800 2400" aria-label="Trainer toolbox drawer links">
          <a class="drawer-link" href="/tools/specialty-kit-finder" aria-label="Specialty Kit Finder, Tier 0, Free">
            <rect class="drawer-hit" x="360" y="1200" width="1080" height="96" rx="10" />
            <text class="drawer-label" x="402" y="1260">Specialty Kit Finder</text>
            <rect class="badge-bg" x="1090" y="1216" width="325" height="64" rx="30" />
            <text class="badge-text" x="1252" y="1258">Tier 0 · Free</text>
          </a>

          <a class="drawer-link" href="/tools/instructor-map" aria-label="Instructor Map, Tier 0, Free">
            <rect class="drawer-hit" x="360" y="1330" width="1080" height="96" rx="10" />
            <text class="drawer-label" x="402" y="1390">Instructor Map</text>
            <rect class="badge-bg" x="1090" y="1346" width="325" height="64" rx="30" />
            <text class="badge-text" x="1252" y="1388">Tier 0 · Free</text>
          </a>

          <a class="drawer-link" href="/tools/conference-calendar" aria-label="Conference Calendar, Tier 0, Free">
            <rect class="drawer-hit" x="360" y="1460" width="1080" height="96" rx="10" />
            <text class="drawer-label" x="402" y="1520">Conference Calendar</text>
            <rect class="badge-bg" x="1090" y="1476" width="325" height="64" rx="30" />
            <text class="badge-text" x="1252" y="1518">Tier 0 · Free</text>
          </a>

          <a class="drawer-link" href="/tools/vault-preview" aria-label="Vault Preview, Tier 0, Free">
            <rect class="drawer-hit" x="360" y="1590" width="1080" height="96" rx="10" />
            <text class="drawer-label" x="402" y="1650">Vault Preview</text>
            <rect class="badge-bg" x="1090" y="1606" width="325" height="64" rx="30" />
            <text class="badge-text" x="1252" y="1648">Tier 0 · Free</text>
          </a>

          <a class="drawer-link" href="/tools/vault-workflow-downloads" aria-label="Vault Workflow plus Downloads, Tier 1, 25 dollars per year">
            <rect class="drawer-hit" x="360" y="1720" width="1080" height="96" rx="10" />
            <text class="drawer-label" x="402" y="1780">Vault Workflow + Downloads</text>
            <rect class="badge-bg" x="1075" y="1736" width="340" height="64" rx="30" />
            <text class="badge-text" x="1245" y="1778">Tier 1 · $25/yr</text>
          </a>
        </svg>
      </div>
    </section>
  </main>
</body>
</html>
