services:
  - type: web
    name: hazmat-toolkit-api
    runtime: node
    rootDir: backend/postgres/api
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: LOG_LEVEL
        value: info
      - key: CORS_ORIGIN
        value: "*"
      - key: JOIN_CODE_TTL_MINUTES
        value: "60"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: ICS_COLLAB_PUBLIC_BASE_URL
        sync: false
  - type: web
    name: ics-collaborative-map
    runtime: static
    buildCommand: echo "ICS Collaborative Map static site"
    staticPublishPath: Incident-Mapper-Apple/app/ios/App/App/public/apps/ics-collaborative-map
