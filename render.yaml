services:
  - type: web
    name: hazmat-toolkit-api
    runtime: node
    rootDir: backend/postgres/api
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: LOG_LEVEL
        value: info
      - key: CORS_ORIGIN
        value: "*"
      - key: JOIN_CODE_TTL_MINUTES
        value: "60"
      - key: AUTH_TOKEN_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: ICS_COLLAB_PUBLIC_BASE_URL
        sync: false
  - type: web
    name: ics-collaborative-map
    runtime: static
    buildCommand: echo "ICS Collaborative Map static site"
    staticPublishPath: Incident-Mapper-Apple/app/ios/App/App/public/apps/ics-collaborative-map
  - type: web
    name: specialty-kit-finder
    runtime: static
    rootDir: native-ios/App/public/toolbox/training/specialty-kits
    buildCommand: npm ci && npm run build
    staticPublishPath: native-ios/App/public/toolbox/training/specialty-kits
    envVars:
      - key: SPECIALTY_KITS_SUPABASE_URL
        value: https://domebvsyhexhgvsducbm.supabase.co
      - key: SPECIALTY_KITS_SUPABASE_ANON_KEY
        sync: false
      - key: SPECIALTY_KITS_ADMIN_EMAILS
        value: john.holtan@lightsonss.com
      - key: SPECIALTY_KITS_OPENCAGE_API_KEY
        sync: false
